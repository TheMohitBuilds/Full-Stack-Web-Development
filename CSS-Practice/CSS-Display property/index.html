<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Display Property</title>
    <style>
    .box{
        border: 2px solid gray;
        display: inline-block;
        padding: 45px;
        margin: 34px;
        display: flex;
        justify-content: center;
    }


    </style>
</head>
<body>
    <h1>Display Property</h1>
    <div class="box">TheMohitBuilds</div>
    <span class="box">Full-Stack-AI-Engineer</span>
    
</body>
</html>
