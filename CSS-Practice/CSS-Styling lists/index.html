<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Styling Lists </title>
    <style>
        .box{padding: 15px;
             border: 3px solid black;
             font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 35px;}
        nav ul li {
            list-style-type: square;
            /* list-style-type: "💀"; */
            background-color: darkkhaki;
            border: 2px solid black;
            /* list-style-position: inside; */
            list-style: disc inside url(https://www.magictouchnet.com/wp-content/uploads/2019/01/factors-to-consider-when-selecting-a-programming-language.jpg)
             }
        .li{font-size: 20px;}
    </style>
</head>

<body>
    <nav>
        <h1 class="box">CSS - styling lists :</h1>
        <ul>
            <p>
                <li>Full-Stack-Web-Development</li>
            </p>
            <p>
                <li>TheMohitBuilds~</li>
            </p>
            <p>
                <li>HTML | CSS | JAVASCRIPT | C++ | PYTHON</li>
            </p>
        </ul>
    </nav>
</body>

</html>
