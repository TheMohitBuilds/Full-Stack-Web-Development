        body{background-color: beige;}

        .boxes::before {
            content: "Full-Stack-AI-Engineer";

            border: 2px solid black;
            letter-spacing: 5px;

        .boxes::after {

        ::selection {

        input::placeholder {
            color: rgb(100, 100, 111);
