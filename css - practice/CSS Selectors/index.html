<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
    <style>
        /* Element Selectors */
        div{background-color: cadetblue;}

        /* Class Selectors */
        .cornflowerblue{
            background-color: cornflowerblue;
        }
        .dodgerblue{
            background-color: dodgerblue;
        }

        /* Id Selectors */
        #lightseagreen{
            background-color: lightseagreen;
        }

        /* Child Selectors */
        div > p{background-color: mediumaquamarine;
            
        }

        /* Descendant Selector */

        /* Pseudo Selectors */
       a:active{
        background-color:coral;}
       a:hover{
        background-color:lightskyblue ;
       }
        

    </style>
</head>
<body>
    <h1>CSS Selectors :</h1>
    <ul>
   <li><p><div>welcome to my web development journey</div></p></li>
   <li><p><div class="cornflowerblue">Hello World!</div></p></li>
   <li><p><div class="dodgerblue">Namaste dunia!</div></p></li>
   <li><div id="lightseagreen">Engineer in the making <p>[Full-Stack-AI-Engineer]</p></div></li>
   <li><p><a href="https://www.google.com">Open Google</a></p></li>
   <li><p><a href="https://www.facebook.com">Open Facebook</a></p></li>

    </ul>
 </body>
 
</html>
