<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Shadows and Outlines</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 24px;
            box-shadow: 5px 5px 15px 5px #888888;
        }

        .box1{text-shadow: 2px 2px 4px #c74141;
        font-size: 25px;
    outline: 2px solid gray;
    outline-color: crimson;
    outline-offset: 5px;}
    </style>
</head>

<body>
    <h1 class="box">CSS - Shadows and Outlines</h1>
    <p class="box1">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Atque itaque dolores, recusandae debitis error tempore
    blanditiis odio sapiente eveniet magni aperiam libero eos modi quia quidem impedit reiciendis beatae? Neque.</p>
</body>

</html>
