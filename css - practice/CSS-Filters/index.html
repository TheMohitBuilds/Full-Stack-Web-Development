<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Filters</title>
    <style>
        /* .img1{filter: blur(2px)  }*/
           .img1{filter: grayscale(100%);}

        /* .img2{filter: contrast(200%);} */
        .img2{filter: sepia(60%) opacity(55%);}


    </style>
</head>
<body>
        
    <div class="container">
       
        <img class="img1" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSl9vExTM1uX1V_GWKRJM-lHZ80KdQdHx8Qj65iwPHGvaTGibwfBrS2nHix9mtCZ5fHWU62XWFrlrdmDsFkpyukr6Hg9z_c-uy3LJ_LlqY&s=10" alt="">
        <img class="img2" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSkSE93O7WYpkT71CCexR4r0RbhGfvzkIubPd1sG57wiDCMSN1zqL_4BXht6CXErnWd8QiUiHLj1sLY_yze7HK_sxcz1ewq4SeHyqepKg&s=10" alt="">
    </div>
</body>
</html>
