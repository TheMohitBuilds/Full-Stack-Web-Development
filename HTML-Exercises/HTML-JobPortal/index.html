<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Portal</title>
</head>
<body>

    <header>
        <h1>TechCorp Job Application</h1>
        <p>Please fill out the form below to apply for a position with us.</p>
    </header>
    <hr>

    <form action="#" method="POST">

        <fieldset>
            <legend><strong>Personal Details</strong></legend>
            
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" placeholder="e.g., John Doe" required>
            <br><br>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required>
            <br><br>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="9876543210" pattern="[0-9]{10}" required>
            <br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="dob" required>
            <br><br>

            <label>Gender:</label>
            <input type="radio" id="male" name="gender" value="Male" required>
            <label for="male">Male</label>
            
            <input type="radio" id="female" name="gender" value="Female" required>
            <label for="female">Female</label>
            
            <input type="radio" id="other" name="gender" value="Other" required>
            <label for="other">Other</label>
        </fieldset>
        <br>

        <fieldset>
            <legend><strong>Professional Details</strong></legend>

            <label for="position">Position Applied For:</label>
            <select id="position" name="position" required>
                <option value="">--Select a Role--</option>
                <option value="frontend">Frontend Developer</option>
                <option value="backend">Backend Developer</option>
                <option value="uiux">UI/UX Designer</option>
            </select>
            <br><br>

            <label>Key Skills:</label><br>
            <input type="checkbox" id="skill1" name="skills" value="HTML">
            <label for="skill1">HTML5</label><br>
            <input type="checkbox" id="skill2" name="skills" value="CSS">
            <label for="skill2">CSS3</label><br>
            <input type="checkbox" id="skill3" name="skills" value="JavaScript">
            <label for="skill3">JavaScript</label><br>
            <input type="checkbox" id="skill4" name="skills" value="Python">
            <label for="skill4">Python</label>
            <br><br>

            <label for="location">Preferred Work Location:</label>
            <input list="cities" id="location" name="location" placeholder="Type a city...">
            <datalist id="cities">
                <option value="Delhi">
                <option value="Mumbai">
                <option value="Bangalore">
                <option value="Pune">
                <option value="Hyderabad">
            </datalist>
        </fieldset>
        <br>

        <fieldset>
            <legend><strong>Documents & Experience</strong></legend>

            <label for="resume">Upload Resume (PDF or DOCX only):</label>
            <input type="file" id="resume" name="resume" accept=".pdf, .docx" required>
            <br><br>

            <label for="salary">Expected Salary (₹):</label>
            <input type="range" id="salary" name="salary" min="20000" max="200000" step="5000">
            <br><br>

            <label for="coverLetter">Why should we hire you?</label><br>
            <textarea id="coverLetter" name="coverLetter" rows="5" cols="40" placeholder="Write a short cover letter here..."></textarea>
        </fieldset>
        <br>

        <fieldset>
            <legend><strong>Declaration</strong></legend>

            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I confirm that the information provided is accurate and true.</label>
            <br><br>

            <button type="submit">Submit Application</button>
            <button type="reset">Clear Form</button>
        </fieldset>

    </form>

</body>
</html>
