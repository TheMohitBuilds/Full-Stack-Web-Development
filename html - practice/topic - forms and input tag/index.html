<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMS - let's learn it</title>
</head>

<body>
    <h1>FORM - to apply for the internship</h1>
    <form action="post"></form>
    <input type="password" name="password" placeholder="Enter your password">
    <div>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="transgender" name="gender" value="transgender">
        <label for="transgender">transgender</label>
    </div>
    <div>
        <input type="checkbox" id="done" name="done" value="yes">
        <label for="done">HTML</label>
    </div>
    <div>
        <input type="checkbox" id="done" name="done" value="yes">
        <label for="done">CSS</label>
    </div>
    <div>
        <input type="checkbox" id="done" name="done" value="yes">
        <label for="done">JAVA SCRIPT</label>
    </div>
    <div>
        <textarea name="comment" rows="4" cols="50">
      Enter your projects here...
</textarea>
    </div>
    <div>
        <select name="projects">
            <option value="To-do app">To-do</option>
            <option value="calculator">calculator</option>
            <option value="google form">google form</option>
            <option value="None">None</option>
        </select>
    </div>
</body>

</html>
